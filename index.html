<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>First Session — Find a Teen Therapist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a5f7a; color: #fff; padding: 1.5rem; text-align: center; }
    header h1 { font-size: 1.5rem; }
    header p { margin-top: .25rem; opacity: .85; font-size: .9rem; }
    main { max-width: 48rem; margin: 1.5rem auto; padding: 0 1rem; }

    /* Search form */
    #search-form { background: #fff; border-radius: .5rem; padding: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); margin-bottom: 1rem; }
    #search-form label { display: block; font-weight: 600; margin-bottom: .25rem; font-size: .85rem; }
    #search-form input,
    #search-form select { width: 100%; padding: .5rem; border: 1px solid #ccc; border-radius: .25rem; margin-bottom: .75rem; font-size: .9rem; }
    .filters { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
    #search-form button[type="submit"] { width: 100%; padding: .6rem; background: #1a5f7a; color: #fff; border: none; border-radius: .25rem; font-size: 1rem; cursor: pointer; }

    /* Results */
    #results-summary { font-weight: 600; margin-bottom: .75rem; }
    .therapist-card { background: #fff; border-radius: .5rem; padding: 1rem; margin-bottom: .75rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .therapist-card h3 { margin-bottom: .25rem; }
    .therapist-card p { font-size: .85rem; color: #555; margin-bottom: .25rem; }
    .therapist-card .insurance { color: #1a5f7a; font-weight: 500; }
    .contact-paths { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .75rem; }
    .contact-paths a,
    .contact-paths button { padding: .35rem .7rem; border-radius: .25rem; font-size: .8rem; text-decoration: none; cursor: pointer; }
    .contact-paths a { background: #e8f4f8; color: #1a5f7a; border: 1px solid #b8dae6; }
    .contact-paths button { background: #f0f0f0; color: #333; border: 1px solid #ccc; }
    .contact-paths .intake-org-btn { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
  </style>
</head>
<body>
  <header>
    <h1>First Session</h1>
    <p>Find a Medicaid teen therapist in NYC — fast.</p>
  </header>

  <main>
    <form id="search-form">
      <label for="query-input">Search by name or specialty</label>
      <input id="query-input" type="text" placeholder="e.g. Anxiety, CBT, Dr. Chen…" />

      <div class="filters">
        <div>
          <label for="filter-location">Borough</label>
          <select id="filter-location">
            <option value="">All boroughs</option>
            <option value="Brooklyn">Brooklyn</option>
            <option value="Bronx">Bronx</option>
            <option value="Queens">Queens</option>
            <option value="Manhattan">Manhattan</option>
            <option value="Staten Island">Staten Island</option>
          </select>
        </div>
        <div>
          <label for="filter-specialty">Specialty</label>
          <select id="filter-specialty">
            <option value="">All specialties</option>
            <option value="Anxiety">Anxiety</option>
            <option value="Depression">Depression</option>
            <option value="Trauma">Trauma</option>
            <option value="ADHD">ADHD</option>
            <option value="CBT">CBT</option>
            <option value="Family Therapy">Family Therapy</option>
          </select>
        </div>
        <div>
          <label for="filter-insurance">Insurance</label>
          <select id="filter-insurance">
            <option value="">All plans</option>
            <option value="Medicaid">Medicaid</option>
            <option value="Fidelis">Fidelis</option>
            <option value="Healthfirst">Healthfirst</option>
            <option value="MetroPlus">MetroPlus</option>
            <option value="Affinity">Affinity</option>
          </select>
        </div>
        <div>
          <label for="filter-age-range">Age range</label>
          <select id="filter-age-range">
            <option value="">Any age</option>
            <option value="10-18">10–18</option>
            <option value="12-18">12–18</option>
            <option value="13-17">13–17</option>
            <option value="13-19">13–19</option>
            <option value="14-18">14–18</option>
          </select>
        </div>
      </div>

      <button type="submit">Search</button>
    </form>

    <div id="results-summary"></div>
    <div id="results"></div>
  </main>

  <script type="module" src="src/app.js"></script>
</body>
</html>
